version: "2"
sql:
  -
    engine: "postgresql"
    schema: "./migrations"
    queries: "queries.sql"
    gen:
      go:
        package: "repository"
        out: "../internal/repository/postgres"
        emit_json_tags: true
        sql_package: "pgx/v5"
        overrides:
        -
          db_type: "timestamptz"
          go_type:
            import: "time"
            type: "Time"